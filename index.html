<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold2:#E8C97A;
  --navy:#0A1628;--navy2:#0D1F3C;--navy3:#0f1e38;
  --cyan:#22D3EE;--card:#0F1E36;--card2:#142038;
  --text:#F0F4FF;--muted:#8899BB;--border:#1E3354;
}
html{scroll-behavior:smooth}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--navy);color:var(--text);line-height:1.6;font-size:15px}
a{color:inherit;text-decoration:none}
img{max-width:100%}

/* ===== HEADER ===== */
header{position:sticky;top:0;z-index:999;background:rgba(10,22,40,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.hdr{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:12px;padding:0 20px;height:64px}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0;cursor:pointer}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,#C9A84C,#E8C97A);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.logo-name{font-size:19px;font-weight:800;color:var(--gold);letter-spacing:.5px}
.logo-sub{font-size:9px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase}
nav{display:flex;gap:2px;flex:1;justify-content:center}
.nav-a{padding:6px 9px;font-size:12px;color:var(--muted);border-radius:6px;cursor:pointer;transition:color .2s;white-space:nowrap}
.nav-a:hover{color:var(--text)}
.lang-sw{display:flex;gap:3px}
.lb{padding:5px 9px;font-size:11px;font-weight:600;border-radius:5px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:.2s}
.lb.on{background:var(--gold);color:#000;border-color:var(--gold)}
.hdr-cta{padding:9px 16px;background:var(--gold);color:#000;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;white-space:nowrap;border:none}
.mob-menu{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px}
.mob-menu span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px}
.mob-nav{display:none;flex-direction:column;background:var(--navy2);border-bottom:1px solid var(--border)}
.mob-nav .nav-a{padding:12px 20px;border-radius:0;border-bottom:1px solid var(--border)}

/* ===== HERO ===== */
.hero{min-height:90vh;display:flex;align-items:center;justify-content:center;padding:80px 20px 60px;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 55% at 50% 0%,rgba(34,211,238,.09) 0%,transparent 65%),radial-gradient(ellipse 45% 45% at 85% 85%,rgba(201,168,76,.07) 0%,transparent 55%),var(--navy)}
.hero-inner{position:relative;max-width:860px;text-align:center;z-index:1}
.badge{display:inline-block;padding:6px 18px;border:1px solid rgba(201,168,76,.45);border-radius:999px;font-size:12px;color:var(--gold);margin-bottom:24px;letter-spacing:.3px}
.hero-h1{font-size:clamp(26px,4.5vw,52px);font-weight:900;line-height:1.12;margin-bottom:22px;letter-spacing:-.5px}
.hero-h1 .hl{color:var(--cyan)}
.hero-p{font-size:clamp(14px,1.8vw,17px);color:var(--muted);max-width:680px;margin:0 auto 38px;line-height:1.75}
.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:52px}
.btn-gold{padding:14px 26px;background:var(--gold);color:#000;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;border:none;transition:.2s}
.btn-gold:hover{background:var(--gold2)}
.btn-out{padding:14px 26px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;cursor:pointer;background:rgba(255,255,255,.03);color:var(--text);transition:.2s}
.btn-out:hover{border-color:rgba(201,168,76,.5)}
.btn-cyan{padding:14px 26px;border:1.5px solid rgba(34,211,238,.45);border-radius:10px;font-size:14px;cursor:pointer;background:rgba(34,211,238,.07);color:var(--cyan);transition:.2s}
.btn-cyan:hover{background:rgba(34,211,238,.12)}
.stats{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.st{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 22px;text-align:center;min-width:130px}
.st-n{font-size:22px;font-weight:800;color:var(--gold)}
.st-l{font-size:11px;color:var(--muted);margin-top:4px}

/* ===== SECTION ===== */
.sec{padding:76px 20px}
.sec.alt{background:var(--navy2)}
.sec.alt2{background:var(--navy3)}
.inner{max-width:1200px;margin:0 auto}
.sec-tag{display:inline-block;padding:4px 14px;border:1px solid rgba(201,168,76,.35);border-radius:999px;font-size:11px;color:var(--gold);margin-bottom:14px;letter-spacing:.4px}
.sec-h{font-size:clamp(20px,3vw,34px);font-weight:800;margin-bottom:10px}
.sec-p{font-size:14px;color:var(--muted);max-width:620px;margin-bottom:44px;line-height:1.75}
.hr{border:none;border-top:1px solid var(--border)}

/* ===== CARDS ===== */
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}
.grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:26px;transition:border-color .25s,transform .25s}
.card:hover{border-color:rgba(201,168,76,.45);transform:translateY(-2px)}
.card.solar-c{border-color:rgba(201,168,76,.2);background:rgba(201,168,76,.03)}
.c-icon{font-size:30px;margin-bottom:14px}
.c-title{font-size:15px;font-weight:700;margin-bottom:8px}
.c-desc{font-size:13px;color:var(--muted);line-height:1.65}

/* ===== SUBSCRIPTION ===== */
.sub-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:22px}
.sub-c{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;display:flex;flex-direction:column;transition:.25s}
.sub-c:hover{transform:translateY(-2px)}
.sub-c.feat{border-color:var(--gold);background:var(--card2)}
.s-badge{display:inline-block;padding:3px 11px;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:.5px;margin-bottom:14px}
.b-b2c{background:rgba(34,211,238,.15);color:var(--cyan)}
.b-b2b{background:rgba(201,168,76,.18);color:var(--gold)}
.b-gov{background:rgba(139,92,246,.18);color:#A78BFA}
.s-name{font-size:20px;font-weight:800;margin-bottom:5px}
.s-for{font-size:12px;color:var(--muted);margin-bottom:18px;line-height:1.5}
.s-list{list-style:none;margin-bottom:18px;flex:1}
.s-list li{font-size:12px;color:var(--muted);padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05);display:flex;gap:8px;align-items:flex-start}
.s-list li::before{content:"✓";color:var(--cyan);font-weight:700;flex-shrink:0;margin-top:1px}
.s-price{font-size:13px;color:var(--gold);font-weight:600;margin-bottom:16px}
.s-cta{padding:11px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;text-align:center;border:1.5px solid var(--gold);color:var(--gold);background:transparent;transition:.2s}
.s-cta:hover{background:rgba(201,168,76,.1)}
.sub-c.feat .s-cta{background:var(--gold);color:#000}
.sub-c.feat .s-cta:hover{background:var(--gold2)}
.sub-note{margin-top:26px;font-size:12px;color:var(--muted);text-align:center;padding:14px;border:1px solid var(--border);border-radius:10px;background:var(--card)}

/* ===== SEGMENTS ===== */
.seg-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:24px}
.seg-c{border-radius:20px;padding:34px;border:1px solid var(--border);transition:.25s}
.seg-c:hover{transform:translateY(-2px)}
.seg-b2c{background:linear-gradient(140deg,rgba(34,211,238,.07),rgba(34,211,238,.02))}
.seg-b2b{background:linear-gradient(140deg,rgba(201,168,76,.07),rgba(201,168,76,.02))}
.seg-b2g{background:linear-gradient(140deg,rgba(139,92,246,.07),rgba(139,92,246,.02))}
.seg-type{font-size:32px;font-weight:900;opacity:.12;line-height:1;margin-bottom:6px}
.seg-lbl{font-size:21px;font-weight:800;margin-bottom:5px}
.seg-for{font-size:12px;color:var(--muted);margin-bottom:16px}
.seg-ul{list-style:none;margin-bottom:22px}
.seg-ul li{font-size:13px;color:var(--muted);padding:4px 0;display:flex;gap:8px}
.seg-ul li::before{content:"→";opacity:.45}
.seg-btn{display:inline-block;padding:11px 20px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid}
.seg-b2c .seg-btn{border-color:var(--cyan);color:var(--cyan)}
.seg-b2b .seg-btn{border-color:var(--gold);color:var(--gold)}
.seg-b2g .seg-btn{border-color:#A78BFA;color:#A78BFA}

/* ===== FORM ===== */
.form-wrap{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:38px;max-width:820px;margin:0 auto}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.form-row.one{grid-template-columns:1fr}
.fg{display:flex;flex-direction:column;gap:6px}
.fg label{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.3px}
.fg input,.fg select,.fg textarea{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:9px;padding:11px 13px;color:var(--text);font-size:13px;outline:none;transition:border-color .2s;font-family:inherit}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:rgba(201,168,76,.6)}
.fg select option{background:#0D1F3C}
.fg textarea{resize:vertical;min-height:90px}
.submit-btn{width:100%;padding:15px;background:var(--gold);color:#000;border:none;border-radius:11px;font-size:15px;font-weight:800;cursor:pointer;margin-top:10px;transition:.2s;letter-spacing:.3px}
.submit-btn:hover{background:var(--gold2)}
.success-box{background:rgba(34,211,238,.07);border:1px solid rgba(34,211,238,.3);border-radius:14px;padding:32px;text-align:center}
.success-box .si{font-size:48px;margin-bottom:14px}
.success-box .st2{font-size:17px;font-weight:700;margin-bottom:8px;color:var(--cyan)}
.success-box .sd{font-size:13px;color:var(--muted)}

/* ===== CONTACT ===== */
.ct-grid{display:grid;grid-template-columns:1fr 1fr;gap:32px;align-items:start}
.ct-info{display:flex;flex-direction:column;gap:16px}
.ct-item{display:flex;gap:14px;align-items:center}
.ct-ic{width:44px;height:44px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ct-lbl{font-size:11px;color:var(--muted);margin-bottom:2px}
.ct-val{font-size:14px;font-weight:600}
.ct-map{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:26px}
.ct-map-title{font-size:14px;font-weight:600;margin-bottom:14px}
.map-box{background:var(--navy2);border-radius:10px;height:190px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid var(--border);gap:8px}
.map-box .mi{font-size:32px}
.map-box .mt{font-size:13px;color:var(--muted)}
.social-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.soc-btn{padding:10px 16px;border:1px solid var(--border);border-radius:9px;font-size:12px;font-weight:600;color:var(--text);cursor:pointer;transition:.2s;text-decoration:none;display:inline-block}
.soc-btn:hover{border-color:var(--gold);color:var(--gold)}

/* ===== FOOTER ===== */
footer{background:var(--navy);border-top:1px solid var(--border);padding:44px 20px 24px}
.ft-inner{max-width:1200px;margin:0 auto}
.ft-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:32px;margin-bottom:32px}
.ft-brand{font-size:17px;font-weight:800;color:var(--gold);margin-bottom:8px}
.ft-tag{font-size:12px;color:var(--muted);line-height:1.7}
.ft-h{font-size:12px;font-weight:700;color:var(--text);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.ft-ul{list-style:none;display:flex;flex-direction:column;gap:9px}
.ft-ul li{font-size:12px;color:var(--muted);cursor:pointer;transition:color .2s}
.ft-ul li:hover{color:var(--gold)}
.ft-bot{border-top:1px solid var(--border);padding-top:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.ft-copy{font-size:12px;color:var(--muted)}

/* ===== FLOATING ===== */
.float{position:fixed;bottom:24px;right:22px;display:flex;flex-direction:column;gap:11px;z-index:998}
.fb{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;border:none;transition:.2s;text-decoration:none;box-shadow:0 4px 16px rgba(0,0,0,.5)}
.fb:hover{transform:scale(1.1)}
.ftg{background:#229ED9}
.fwa{background:#25D366}
.fph{background:var(--gold)}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  nav{display:none}
  .mob-menu{display:flex}
  .form-row{grid-template-columns:1fr}
  .ct-grid{grid-template-columns:1fr}
  .ft-grid{grid-template-columns:1fr 1fr}
  .hero-h1{font-size:26px}
  .form-wrap{padding:22px}
  .hdr-cta{display:none}
}
@media(max-width:480px){
  .ft-grid{grid-template-columns:1fr}
  .stats{gap:10px}
  .st{min-width:110px;padding:12px 14px}
}
</style>

  var name    = sel('f-name')   ? sel('f-name').value.trim()   : '';
  var phone   = sel('f-phone')  ? sel('f-phone').value.trim()  : '';

  var storage = sel('f-stor')   ? sel('f-stor').value           : '';
  var subPkg  = sel('f-sp')     ? sel('f-sp').value             : '';
  var msg     = sel('f-msg')    ? sel('f-msg').value.trim()     : '';

  if(!name||!phone){alert(t.valMsg);return;}

  sendToTelegram({

  if(E('dl-h'))   E('dl-h').textContent=d.dlH;
  if(E('dl-p'))   E('dl-p').textContent=d.dlP;
  if(E('dl-lh'))  E('dl-lh').textContent=d.lvH;
  if(E('dl-sub')) E('dl-sub').textContent=d.lvSub;
  if(E('dl-adv')){
    E('dl-adv').innerHTML=d.advs.map(function(a){return(
      '<div class="adv-c"><div class="adv-ic">'+a.icon+'</div><div class="adv-tt">'+a.t+'</div><div class="adv-dd">'+a.d+'</div></div>'
    )}).join('');
  }
  if(E('dl-levels')){
    E('dl-levels').innerHTML=d.levels.map(function(lv){return(
      '<div class="lv-card '+lv.css+'">'+
        '<div class="lv-icon">'+lv.icon+'</div>'+
        '<div class="lv-name">'+lv.name+'</div>'+
        '<ul class="lv-perks">'+lv.perks.map(function(p){return'<li>'+p+'</li>'}).join('')+'</ul>'+
        '<div class="lv-note">'+d.lvNote+'</div>'+
        '<button class="lv-cta" onclick="scrollSec(\'dealers\')">'+d.btn+'</button>'+
      '</div>'
    )}).join('');
  }
  if(E('dl-form')){
    if(DS){
      E('dl-form').innerHTML='<div class="success-box"><div class="si">✅</div><div class="st2">'+d.ok+'</div></div>';
    } else {
      var f=d.flds;
      function opts(a){return a.map(function(o){return'<option>'+o+'</option>'}).join('');}
      E('dl-form').innerHTML=
        '<div class="dealer-form-box">'+
          '<div class="dealer-form-h">'+d.fh+'</div>'+
          '<div class="dealer-form-p">'+d.fp+'</div>'+
          '<div class="form-row"><div class="fg"><label>'+f.name+'</label><input type="text" id="d-name"></div>'+
          '<div class="fg"><label>'+f.phone+'</label><input type="tel" id="d-phone" placeholder="+998 XX XXX XX XX"></div></div>'+
          '<div class="form-row"><div class="fg"><label>'+f.tg+'</label><input type="text" id="d-tg" placeholder="@username"></div>'+
          '<div class="fg"><label>'+f.region+'</label><input type="text" id="d-region"></div></div>'+
          '<div class="form-row"><div class="fg"><label>'+f.type+'</label><select id="d-type">'+opts(d.typeOpts)+'</select></div>'+
          '<div class="fg"><label>'+f.brands+'</label><select id="d-brands">'+opts(d.brandsOpts)+'</select></div></div>'+
          '<div class="form-row"><div class="fg"><label>'+f.exp+'</label><input type="number" id="d-exp" placeholder="3" min="0"></div>'+
          '<div class="fg"></div></div>'+
          '<div class="form-row one"><div class="fg"><label>'+f.msg+'</label><textarea id="d-msg"></textarea></div></div>'+
          '<button class="submit-btn" onclick="submitDealer()">'+d.btn+'</button>'+
        '</div>';
    }
  }
  var labels={uz:['Brendlar','Loyihalar','Dilerlar'],ru:['Бренды','Проекты','Дилеры'],en:['Brands','Projects','Dealers']};
  var lb=labels[l];
  ['nav','mobNav'].forEach(function(nid){
    var nav=document.getElementById(nid);if(!nav)return;
    ['ext-br','ext-pr','ext-dl'].forEach(function(id){var o=document.getElementById(id);if(o)o.remove();});
    [['brands',lb[0],'ext-br'],['projects',lb[1],'ext-pr'],['dealers',lb[2],'ext-dl']].forEach(function(item){
      var sp=document.createElement('span');
      sp.className='nav-a';sp.id=item[2];sp.textContent=item[1];
      sp.onclick=function(){scrollSec(item[0]);if(nid==='mobNav')document.getElementById('mobNav').style.display='none';};
      nav.appendChild(sp);
    });
  });
}

function submitDealer(){
  var l=LANG||'uz';var d=SD[l];
  var n=E('d-name')?E('d-name').value.trim():'';
  var p=E('d-phone')?E('d-phone').value.trim():'';
  var msg=l==='uz'?'Iltimos, ism va telefon kiriting.':l==='ru'?'Пожалуйста, введите имя и телефон.':'Please enter name and phone.';
  if(!n||!p){alert(msg);return;}

  // Send to Telegram
  var tgMsg =
    '🤝 Янги дилер аризаси — WST\n\n'+
    '👤 Исм: '       + n + '\n'+
    '📞 Телефон: '   + p + '\n'+
    '✈ Telegram: '  + (E('d-tg')?E('d-tg').value:'—') + '\n'+
    '📍 Ҳудуд: '     + (E('d-region')?E('d-region').value:'—') + '\n'+
    '🏢 Тур: '       + (E('d-type')?E('d-type').value:'—') + '\n'+
    '🏷️ Брендлар: ' + (E('d-brands')?E('d-brands').value:'—') + '\n'+
    '📅 Тажриба: '   + (E('d-exp')?E('d-exp').value:'—') + ' йил\n'+
    '💬 Изоҳ: '      + (E('d-msg')?E('d-msg').value:'—') + '\n'+
    '⏰ Вақт: '      + new Date().toLocaleString('uz-UZ');

  fetch('https://api.telegram.org/bot'+TG_TOKEN+'/sendMessage',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({chat_id:TG_CHAT,text:tgMsg})
  }).catch(function(e){console.log('TG error:',e);});

  DS=true;renderExtras();
}

var _oSL=window.setLang;
window.setLang=function(l){DS=false;_oSL(l);renderExtras();};
setTimeout(renderExtras,300);
</script>
</body>
</html>
